# ~/.config/i3/modules/misc.conf
# Configurações diversas e complementares

# ========== SCREEN OPERATIONS ==========
# Print - Área selecionada
bindsym --release Mod4+Print $exe sh -c 'mkdir -p $HOME/Imagens/Screenshots/ && flameshot gui 2>/dev/null'
# Print - Tela inteira com cópia para clipboard
bindsym --release Print $exe sh -c 'mkdir -p $HOME/Imagens/Screenshots/ && flameshot full -c -p $HOME/Imagens/Screenshots 2>/dev/null'
# Print - Janela clicada e cópia para clipboard
bindsym --release Mod4+j $exe sh -c 'mkdir -p $HOME/Imagens/Screenshots/ && cd $HOME/Imagens/Screenshots/ && scrot -s -b -e "xclip -selection clipboard -t image/png -i \$f && notify-send -i camera-photo '\''Screenshot'\'' '\''✓ Copiada para clipboard\n✓ Salva em Screenshots'\''"'

# Screen recording
$sup+g $exe launch_ssrecorder.sh &
#$sup+g $exe simplescreenrecorder --start-hidden 

# OCR
bindsym $alt+o $exe image_to_text.sh
# Barcode Reader/Scanner
bindsym $alt+q $exe qrscan.sh
# QRcode Reader/Scanner
bindsym $alt+b $exe barcode_scan.sh

# ========== MEDIA BINDINGS ==========
# [VOLUME CONTROL] ---------------------------------------
# ↑ Volume (+10%) 
bindsym XF86AudioRaiseVolume exec pactl set-sink-volume @DEFAULT_SINK@ +10% && $vol_signal 
# ↓ Volume (-10%)
bindsym XF86AudioLowerVolume exec pactl set-sink-volume @DEFAULT_SINK@ -10% && $vol_signal
# Mute/Unmute
bindsym XF86AudioMute exec pactl set-sink-mute @DEFAULT_SINK@ toggle && $vol_signal  

# [MICROPHONE] -------------------------------------------
# Mute/Unmute microfone
bindsym XF86AudioMicMute exec pactl set-source-mute @DEFAULT_SOURCE@ toggle  

# [MEDIA PLAYBACK] ---------------------------------------
# Play/Pause dual-function
bindsym XF86AudioPlay exec playerctl play-pause
# Parar
bindsym XF86AudioStop exec playerctl stop
# Próxima faixa 
bindsym XF86AudioNext exec playerctl next
# Faixa anterior 
bindsym XF86AudioPrev exec playerctl previous    

# [BRIGHTNESS] -------------------------------------------
# + Brilho
bindsym XF86MonBrightnessUp exec xbacklight -inc 20 
# - Brilho
bindsym XF86MonBrightnessDown exec xbacklight -dec 20  

# ========== NOTIFICATION CONTROLS ==========
# Fecha notificação atual
bindsym Ctrl+space             $exe dunstctl close
# Limpa todas notificações    
bindsym Ctrl+Shift+space       $exe dunstctl close-all 
# Mostra última notificação 
bindsym Ctrl+comma             $exe dunstctl history-pop
# Abre contexto/link (.)
bindsym Ctrl+period            $exe dunstctl context
# Pausa/retoma notificações(toggle)
bindsym Ctrl+Shift+comma       $exe dunstctl set-paused toggle        
