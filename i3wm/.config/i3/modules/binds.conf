# ~/.config/i3/modules/binds.conf
# Definições de teclas de atalho

include ~/.config/i3/modules/env.conf

# ========== SYSTEM BINDINGS ==========
# [SESSION CONTROL] --------------------------------------
# Reinicia o i3 (preserva sessão)
$ss+r restart, exec "notify-send -i none '🔄 i3wm' 'Interface Reiniciada' --hint=string:x-dunst-stack-tag:layout"
# Recarrega configuração e notifica
$ss+c reload, exec "notify-send -i none '♻️ i3wm' 'Configuração Recarregada' --hint=string:x-dunst-stack-tag:layout"
# Sai do i3 (volta para login manager)
$ss+e $exe systemctl --user stop graphical-session.target && i3-msg exit
# Desligamento imediato
$ss+d $exe shutdown -h now
# Power Menu
$sup+d $exe $HOME/.config/rofi/powermenu/type-2/powermenu.sh
# Reinicia o sistema 
$ss+b $exe systemctl reboot
# Suspende o sistema 
$ss+s $exe systemctl suspend
# Bloquear Tela
$sup+l $exe random_wallpaper_betterlockscreen.sh

## Dual boot: reinicia no Windows
## ==> Windows
## sudo grep menuentry /boot/grub/grub.cfg    
## sudo EDITOR=nano visudo
## Same thing without a password
## %wheel ALL=(ALL) NOPASSWD:/usr/bin/grub-reboot

# Dual boot: GRUB
#$ss+w $exe sudo grub-reboot 2 && reboot
# Dual boot: Refind
$ss+w $exe sudo efibootmgr -n 0004 && sudo reboot
 
# System tools
# Alternar monitores, gerenciador de exibição
$ss+F8 $exe toggle_mons.sh
# Ligar/desligar compositor(Picom)
$sup+F4 $exe toggle_picom.sh
# Testar notificações do Dunst
$ss+t $exe restart_test_dunst.sh
# Gerenciador de inatividade, energia/suspensão
$ss+x $exe toggle_xidlehook.sh
# Ajuda do i3 
$sc+h exec xdg-open https://i3wm.org/docs/userguide.html
# Cheatsheet - Dica: -i + /palavra → ativa ignore-case
$sup+i $exe kitty --title cheatsheet -e glow $HOME/.config/i3/scripts/cheatsheet.md -p

# [POLYBAR] --------------------------------------------
## Polybar toggle, hide or show 
## Barra especifica. Ver PID e nome da barra:  ps -p $(pgrep -d, polybar) -o pid,command 
## $sup+o $exe polybar-msg -p <pid> cmd toggle
# Ocultar todas as barras(Polybar)
$sup+o $exe polybar-msg cmd toggle 
# Ocultar Polybar do monitor secudário, se conectado.
$ss+o $exe $HOME/.config/polybar/scripts/toggle_polybar.sh

# ========== APPLICATION BINDINGS ==========
# Lançadores de aplicativos e controles específicos
# Mapeamento de teclas xmodmap -pke ou xev | grep -i key

# [TERMINALS] ---------------------------------------------
# Kitty
$sup+Return $exe kitty
# Terminal flutuante 
bindsym F1 $exe draw_window.sh
# Dropdown Kitty
bindsym F2 $exe dropdown.sh

# [BROWSERS] ---------------------------------------------
# Firefox
$sup+f $exe firefox
# Brave
$sup+b $exe "pkill brave || brave"
# Google Chrome
$sup+c $exe "xdotool search --class Google-chrome windowkill || google-chrome-stable"
# Qutebrowser
$cs+q  $exe "pkill qutebrowser || qutebrowser"
# Siepe
# $ca+t  $exe firefox https://outlook.live.com/mail/0/ https://mail.google.com/mail/u/1/?ogbl#inbox https://www.siepe.educacao.pe.gov.br/
# Google Meet
$sup+m $exe google-chrome-stable -url meet.google.com/svc-vasq-drv

# [FILE MANAGEMENT] ---------------------------------------
# Thunar
$sup+x $exe "killall Thunar || Thunar"
# Yazi
$sup+y $exe "pkill yazi || kitty -e 'yazi'"
# Ranger
$sup+r $exe "pkill ranger || kitty -e 'ranger'"

# [UTILITIES] --------------------------------------------
#$sup+p $exe pywal_wallpaper.sh
# Gerenciador de Wallpaper usando Pywal
$sup+p $exe python3 ~/.config/i3/scripts/pywal_gui.py 2>/dev/null
# KDE Connect
$sup+backslash $exe launch_kdeconnect.sh &
# Bluetooth
$sc+b $exe bash -c "pkill blueman-applet || blueman-applet"
# Launcher 
$as $exe $HOME/.config/rofi/launchers/type-1/launcher.sh
# Launcher Dmenu
bindsym $altgr+space $exe dmenu_run
# Alarme
$sup+a $exe toggle_alarm.sh 
# Launch SIGE - Sistema de Informações e Gerenciamento Escolar
$sup+z $exe sige.py "$HOME/Área de trabalho/AUSTRO/DECLARAÇÕES/Banco de Dados/TXT_Output/CSV_Output/dados_unificados.csv"

# Abre o Walker
#$as $exe walker
# Via socket para uma abertura ainda mais rápida (requer netcat)
#$as $exe nc -U /run/user/$(id -u)/walker/walker.sock
# Iniciar o backend Elephant (necessário para os provedores) yay -S elephant elephant-desktopapplications
#$exe elephant
## Iniciar o Walker em modo de serviço para abertura instantânea
#$exe walker --gapplication-service

# Simula o pressionamento de ctrl+v ao pressionar $mod+x
#bindsym --release $sup+x $exe xdotool key --clearmodifiers ctrl+v

# Discovers automatically all UPnP AV Media Servers on the network, 
# and make the content available in a directory tree
# sudo mkdir -p /media/upnp && sudo groupadd fuse && sudo usermod -aG fuse $USER && sudo chown $USER:$USER /media/upnp
#$exe sleep 15 && sudo djmount -o allow_other /media/upnp
#$exe djmount -o allow_other /media/upnp
# UPnP AV Media
bindsym F5 $exe toggle_djmount.sh

# start/close Calculadora
bindsym XF86Calculator $exe launch_calculadora.sh &
# start/close Calculadora
bindsym F6 $exe launch_calculadora.sh &

# Gnirehtet (Reverse Tethering)
bindsym F7 $exe toggle_gnirehtet.sh

# AutoAdb + Scrcpy
# ==> AutoAdb Executar automaticamente qualquer comando assim que um dispositivo for conectado via adb. 
# ==> Scrcpy espelha dispositivos Android (vídeo e áudio) conectados via USB ou sobre TCP/IP , e controlar 
# Encontrar o serial do dispositivo: ==> autoadb printf 'Device %s connected\n' '{}' ou adb devices
# ==> M=Mouse K=Keyboard S=DesligarTela t=MostrarToques w=NãoHibernar r=Record s=SerialDispositivo
#$exe /usr/bin/autoadb scrcpy -MKSts 6bb1a8f7 &
#$exe autoadb_scrcpy.sh &
# AutoAdb + Scrcpy
bindsym F8 $exe toggle_scrcpy.sh

# Start/close rmpc
bindsym F9 $exe toggle_rmpc.sh

# Start/close Spotify
bindsym XF86Tools $exe launch_spotify.sh &
#bindsym F9 $exe launch_spotify.sh &

# Wifi Quick Share
bindsym F11 exec python3 ~/.config/i3/scripts/wifi_qrcode.py 2>/dev/null

# ========== WINDOW MANAGEMENT BINDINGS ==========
# Focus navigation
# Mover foco ←
$sup+$lkey focus left
# Mover foco ↓   
$sup+$dkey focus down
# Mover foco ↑   
$sup+$ukey focus up
# Mover foco →     
$sup+$rkey focus right

# Switch container focus i3-cycle - conflito com o alttab
# Alternar left,right entre janelas 
bindsym --release Mod1+Tab        $exe i3-cycle right
# Alternar up,down entre janelas  
bindsym --release Mod1+shift+Tab  $exe i3-cycle up

# Window movement
# Mover janela ←
$ss+$lkey move left 
# Mover janela ↓  
$ss+$dkey move down 
# Mover janela ↑  
$ss+$ukey move up
# Mover janela →     
$ss+$rkey move right
# Centralizar janela  
$ss+h $center

# Resize controls
# → Aumenta largura
$sc $rkey resize grow width 5 px or 5 ppt
# ← Diminui largura   
$sc $lkey resize shrink width 5 px or 5 ppt
# ↑ Aumenta altura   
$sc $ukey resize grow height 5 px or 5 ppt
# ↓ Diminui altura  
$sc $dkey resize shrink height 5 px or 5 ppt 

# [LAYOUT CONTROL] ---------------------------------------

# Navegação entre containers
# Focar container pai
$sup+Prior focus parent, exec "notify-send -i none '⬆️ Parent' 'Subindo na hierarquia (focar container pai)' --hint=string:x-dunst-stack-tag:layout"
# Focar elemento filho
$sup+Next focus child, exec "notify-send -i none '⬇️ Child' 'Descendo na hierarquia (focar elemento filho)' --hint=string:x-dunst-stack-tag:layout"

# MUDANÇA NO LAYOUT ATUAL DAS JANELAS EXISTENTES
# Janelas em Abas (Guias)
$sup+w exec "flatten_smart.py --force; i3-msg layout tabbed; notify-send -i none '📑 Tabbed' 'Janelas em Abas (Guias)' --hint=string:x-dunst-stack-tag:layout"
# Janelas Empilhadas
$sup+s exec "flatten_smart.py --force; i3-msg layout stacking; notify-send -i none '🗂️ Stacking' 'Janelas Empilhadas' --hint=string:x-dunst-stack-tag:layout"
# Alternando H ↔ V (container atual)
$sup+e layout toggle split, exec "notify-send -i none '↕️ Split' 'Alternando H ↔ V (container atual)' --hint=string:x-dunst-stack-tag:layout"

# Layout Alternando Split -> Stacking -> Tabbed
$sup+Tab layout toggle all, exec "notify-send -i none '🔄 Layout' 'Alternando Split -> Stacking -> Tabbed' --hint=string:x-dunst-stack-tag:layout"

# Modos de Divisão, direcionamento de Split (Tile) (PREPARAÇÃO PARA RECEBE UMA NOVA JANELA)
# Split Horizontal, próxima janela ao lado
$sup+h split h, exec "notify-send -i none '➡️ Split Horizontal' 'PRÓXIMA janela ao lado' --hint=string:x-dunst-stack-tag:layout"
# Split Vertical, próxima janela abaixo
$sup+v split v, exec "notify-send -i none '⬇️ Split Vertical' 'PRÓXIMA janela abaixo' --hint=string:x-dunst-stack-tag:layout"

# Alternar os 2 Layouts acima (PREPARAÇÃO PARA RECEBE UMA NOVA JANELA)
# Split alternando eixo de divisão
$sup+semicolon split toggle, exec "notify-send -i none '🔁 Split' 'Alternando eixo de divisão' --hint=string:x-dunst-stack-tag:layout"

# Orientação Invertendo H ↔ V
$sup+slash layout toggle splitv splith, exec "notify-send -i none '📐 Orientação' 'Invertendo H ↔ V' --hint=string:x-dunst-stack-tag:layout"

# ^^^ ADVERTÊNCIA ^^^
## Se você executar um split e mudar de ideia para tabbed/stacking antes de abrir a nova janela:
## O i3 manterá a hierarquia criada pelo split. Se você abrir 3 janelas agora,
## elas serão abas dentro de um espaço que já estava reservado para ser dividido.
## Como "limpar": O script flatten_smart.py --force é justamente o "antídoto" para isso.
## Ele tenta remover esses containers extras e simplificar a árvore.

# [WINDOW STATES] ----------------------------------------
# Alternar modo flutuante - period=ponto
$sup+period floating toggle
# Alternar foco entre tiling/flutuante - comma=vírgula
$sup+comma focus mode_toggle
# Alternar bordas
$sup+t border toggle
# Esconder janela (scratchpad) 
$sup+minus $scra
# Mostrar janela oculta
$sup+equal $show
# Alternar sticky (visível em todos workspaces)
$ca+s sticky toggle, exec "notify-send -i none '📌 Sticky' 'Janela fixa em todos os desktops' --hint=string:x-dunst-stack-tag:layout"
# Focar janela urgente 
$sup+u [urgent=latest] focus
# Tela cheia
$sup+F11 fullscreen toggle, exec "notify-send -i none '📺 Fullscreen' --hint=string:x-dunst-stack-tag:layout"
# smart|ignore|leave_fullscreen
popup_during_fullscreen smart
# Fecha janela ativa 
$sup+q kill
# Fecha TODAS janelas - CUIDADO! 
$ss+q [class=".*"] kill
# Fechar seletivo → cursor em X 
$sc+Delete --release $exe xkill
# Mata processos travados 
$sup+Escape $exe pkill -9 -f "(crash|not responding)"

# ═══════════════════════════════════════════════════════
#  FILE EDITING DOTFILES
# ═══════════════════════════════════════════════════════
# Dotfiles Mode Config
$sup+apostrophe mode "$mode_dots"
set $mode_dots (K)itty | (B)etterloc | (D)unst | (P)icom | (Z)sh | (F)eh | (N)vim | (T)zathura | (S)amba

mode "$mode_dots" {
    bindsym k exec $nvim_full $HOME/.config/kitty/kitty.conf,   mode "default"
    bindsym b exec $nvim_full $HOME/.config/betterlockscreenrc, mode "default"
    bindsym d exec $nvim_full $HOME/.config/dunst/dunstrc,      mode "default"
    bindsym o exec $nvim_full $HOME/.config/picom/picom.conf,   mode "default"
    bindsym f exec $nvim_full $HOME/.config/feh/themes,         mode "default"
    bindsym z exec $nvim_full $HOME/.zshrc,                     mode "default"
    bindsym n exec $nvim_full $HOME/.config/nvim/init.lua,      mode "default"
    bindsym t exec $nvim_full $HOME/.config/zathura/zathurarc,  mode "default"
    bindsym s exec $nvim_full /etc/samba/smb.conf;              mode "default"
    bindsym Return mode "default"
    bindsym Escape mode "default"
}

# ═══════════════════════════════════════════════════════
#  I3WM MODS — edição rápida dos arquivos de config
# ═══════════════════════════════════════════════════════
# i3 Config Modules
$sup+Home mode "$i3_mods"
set $i3_mods (E)nv | (A)utostart | (M)onitors | (I)nput | (D)ecor | (B)inds | (S)tatus | (W)rules | (M)isc

mode "$i3_mods" {
    bindsym e exec $nvim_full $HOME/.config/i3/modules/env.conf,          mode "default"
    bindsym a exec $nvim_full $HOME/.config/i3/modules/autostart.conf,    mode "default"
    bindsym m exec $nvim_full $HOME/.config/i3/modules/monitors.conf,     mode "default"
    bindsym i exec $nvim_full $HOME/.config/i3/modules/input.conf,        mode "default"
    bindsym d exec $nvim_full $HOME/.config/i3/modules/decoration.conf,   mode "default"
    bindsym b exec $nvim_full $HOME/.config/i3/modules/binds.conf,        mode "default"
    bindsym s exec $nvim_full $HOME/.config/i3/modules/statusbar.conf,    mode "default"
    bindsym w exec $nvim_full $HOME/.config/i3/modules/windowsrule.conf,  mode "default"
    bindsym Shift+m  exec $nvim_full $HOME/.config/i3/modules/misc.conf,  mode "default"
    bindsym Return mode "default"
    bindsym Escape mode "default"
}

# ═══════════════════════════════════════════════════════
#  POLYBAR MODS — edição rápida dos arquivos de config
# ═══════════════════════════════════════════════════════
# Polybar Settings
$sup+End mode "$poly_mods"
set $poly_mods (C)onfig | c(O)lors | (F)onts | (M)odules | (L)aunch | (R)estart

mode "$poly_mods" {
    bindsym c exec $nvim_full $HOME/.config/polybar/config.ini,      mode "default"
    bindsym o exec $nvim_full $HOME/.config/polybar/colors.ini,      mode "default"
    bindsym f exec $nvim_full $HOME/.config/polybar/fonts.ini,       mode "default"
    bindsym m exec $nvim_full $HOME/.config/polybar/modules.ini,     mode "default"
    bindsym l exec $nvim_full $HOME/.config/polybar/launch.sh,       mode "default"
    bindsym r $term $HOME/.config/polybar/launch.sh,                 mode "default"

    bindsym Escape mode "default"
    bindsym Return mode "default"
}
