# ~/.config/i3/modules/windowsrule.conf
# Flags de Expressão Regular (Regex)
# Essas flags são colocadas dentro das aspas, geralmente no início do padrão.

# (?i)  Case-insensitive: Ignora a diferença entre maiúsculas e minúsculas.  [class="(?i)firefox"]
# (.*)	Coringa Total: Corresponde a qualquer sequência de caracteres.       [title=".*YouTube.*"]
# (^)	Início: Garante que o texto comece exatamente com aquele termo.      [class="^Term"] (Pega Terminal, mas não XTerm)
# ($)	Fim: Garante que o texto termine exatamente com aquele termo.        [title="bash$"]
# (|)	OU (Alternância): Seleciona um ou outro aplicativo.                  [class="nautilus|thunar"]

# Seletores de Janela mais comuns
# Estes são os atributos que você pode "filtrar" para aplicar o title_format.

# class	         A classe da janela (geralmente o nome do app).	Para regras gerais de um aplicativo.
# instance	     Para diferenciar janelas do mesmo app (ex: janelas de perfil do Chrome).
# title	         O título que aparece na barra.	Para regras baseadas no conteúdo (ex: um site específico aberto).
# window_role	 O papel da janela (definido pelo desenvolvedor). Útil para identificar janelas de "Pop-up" ou "Configurações".
# con_id	     ID interno do i3.	Mais usado em scripts de automação.
# floating	     Seleciona apenas janelas flutuantes. for_window [floating] title_format "📌 %title"

# 📋 Sequência Lógica do i3wm (O "Bizu")
# 1ºfloating enable >>> A Base. >>> Libera a janela da grade. Sem isso, nada de redimensionar ou mover.
# 2ºsticky enable  >>> A Persistência.  >>> Faz a janela te seguir. Só funciona se a janela já for floating.
# 3ºborder none >>> A Estética. >>> Tira a borda antes do cálculo de tamanho para não dar erro de pixels.
# 4ºresize set X Y >>> A Dimensão. >>> Define o tamanho real. Deve vir antes de posicionar no centro.
# 5ºmove position center >>> O Local. >>> O i3 usa o tamanho do passo anterior para achar o centro perfeito.
# 6ºfullscreen enable >>> A Exceção. >>> Se for usar, aplique após o redimensionamento.
# 7ºscratchpad move >>> O Destino. >>> Manda a janela (já pronta e configurada) para o "limbo".
# 8ºfocus >>> A Interação. >>> Garante que o cursor do teclado esteja na janela ao chamá-la.

# >>> float (1º) → sticky (2º) → border (3º) → resize (4º) → \(position (5º)** → **fullscreen (6º)** → **\)scra (7º) → focus (8º)

# Resumo do porquê desta ordem:
# 1º ao 3º: Você define o estado e a aparência da janela.
# 4º e 5º: Você define a geometria (o tamanho precisa vir antes da posição para o centro ser exato).
# 6º ao 8º: Você define o destino e a finalização do comando.

# Título com caracteres Unicode para criar um destaque visual em todas as janelas (qualquer classe)
# 📌 ▓ ▶▶ ◀◀ ▶◀ ● ➤ ▸ ◂ ↵
for_window [class=".*"] title_format "🐧 %title ↵ %instance | %class 🐧"

for_window [class="Alttab_pywal.py"] $float, border none

# Floating rules - Janelas de diálogo, menus e utilitários devem sempre flutuar
for_window [window_type="(?i)Dialog"] $float, $center
for_window [window_type="(?i)Menu"] $float
for_window [window_type="(?i)Utility"] $float

# Janelas com roles específicos (diálogos secundários: popup, dialog, toobar, browser, about)
for_window [window_role="(?i)pop-up|bubble|app|page-info|task_dialog|Preferences|About"] $float
for_window [window_role="^(?i)picture[ -]?in[ -]picture$"] $float, sticky enable, resize set 459 257, move position 895 506
for_window [window_role="(?i)GtkFileChooserDialog"] $float

# Janelas identificáveis pelo título
for_window [title="(?i)Authy|Preferences$|Progresso$|Informações da Bateria"] $float
for_window [title="^(?i)picture[ -]?in[ -]picture$"] $float, sticky enable, resize set 459 257, move position 895 506
for_window [title=".*QEMU/KVM$"] $nofloat
for_window [title="Nova VM"] $float, $center
for_window [title=".*cheatsheet.*"] $full
for_window [title="shell - i3-quickterm|sidiclei@arch:~"] border none

# System Tools
for_window [class="(?i)Protonvpn-app"] $float, $center
for_window [class="(?i)Yad" title="Calendar"] $float
for_window [class="(?i)Psensor"] $float, resize set 450 590
for_window [class="(?i)KeePassXC"] $float, border none, resize set 926 500, $center
for_window [class="(?i)Arandr"] $float, resize set 280 254
for_window [class="(?i)pavucontrol|easyeffects"] $float, border none, resize set 747 425, $center
for_window [class="(?i)Gnome-calculator"] $float, resize set 100 300, $center
for_window [class="(?i)xdman-Main"] $float, resize set 759 419, move position 1620 1010
for_window [class="(?i)Xdm-app"] $float, resize set 250 40, move position 1620 1010
for_window [class="(?i)Blueman-manager|Blueman-services|simple-scan|Gufw.py|Key-mapper-gtk|kruler|Barrier"] $float, border none, $center, focus
for_window [class="System-config-printer.py" instance="system-config-printer"] $float, border none, $center, focus

# Messaging Apps
for_window [class="(?i)TelegramDesktop|WhatSie|qtwaw|ZapZap|karere|whatsdesk|Whatsapp-for-linux"] $float, border none, resize set 919 555, $center, focus
for_window [class="(?i)zenity"] border none, focus

# Media Applications
for_window [class="(?i)zoom"] $float, resize set 200 480, $center
for_window [class="(?i)smplayer|vlc|amberol|Audacity|qBittorrent|gnome-network-displays"] $float
for_window [class="(?i)qvidcap"] $float, sticky enable, resize set 335 250
for_window [class="(?i)RMPC"] $float, border pixel 2, resize set 801 399, $center
for_window [class="(?i)Nsxiv|feh|Viewnior"] $float, border none, $center, focus

# File Managers and Browsers
for_window [instance="(?i)google-chrome" window_type="normal"] floating disable, fullscreen disable
for_window [instance="(?i)Places|firefox"] $float, resize set 561 328, $center
for_window [instance="(?i)Navigator"] focus
for_window [instance="(?i)pcmanfm|Thunar|nautilus"] focus
for_window [instance="(?i)atril|evince|qpdfview|com\.github\.jeromerobert\.pdfarranger|masterpdfeditor4|org\.pwmt\.zathura"] focus
for_window [instance="(?i)geany"] $center, focus
for_window [instance="(?i)org\.gnome\.FileRoller"] $float, $center, focus

# Special Cases
for_window [instance="(?i)gl"] focus, $full
for_window [instance="(?i)spotify"] focus
for_window [instance="(?i)et|wps"] focus
for_window [class="wps" title="wps"] $float
for_window [class="floating_window"] $float
for_window [class="(?i)Tk|Toplevel|Bell_scheduler_gui.py"] $float, border none, $center, focus

#for_window [instance="anydesk"] $scra
for_window [class="(?i)batterypopup"] $float, sticky enable, border pixel 1, $center
for_window [class="(?i)Alarm-clock-applet|scrcpy"] $float
for_window [class="(?i)walker"] $float, border none, resize set 350 200, $center

# Regras para o Duplicate Cleaner
for_window [class="DuplicateCleaner"] $float, border none, $center
for_window [class="DuplicateTerm"] $full, border none, $center, focus
for_window [class="DuplicateResult"] $float, border none, $center, focus

# Focar imediatamente na última janela que pediu atenção
for_window [urgent=latest] focus

# Captura títulos que começam ou contêm error, apenas marca como urgente
for_window [title="(?i)error"] urgent set
