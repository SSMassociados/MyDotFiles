;==========================================================
;                      MÓDULOS POLYBAR
;              ~/.config/polybar/modules/all.ini
;==========================================================
; Todos os módulos ficam aqui.
; Referenciados no config.ini via modules-left/center/right.
;==========================================================

;----------------------------------------------------------
;  MÓDULO: i3 Workspaces
;----------------------------------------------------------
[module/i3]
type = internal/i3

; === CONFIGURAÇÕES COMPORTAMENTAIS ===
pin-workspaces   = true
strip-wsnumbers  = false
index-sort       = false
enable-click     = true
enable-scroll    = true
wrapping-scroll  = false
reverse-scroll   = false
fuzzy-match      = false

; === MOUSE ACTIONS ===
scroll-up   = i3-msg workspace next_on_output
scroll-down = i3-msg workspace prev_on_output

click-left   = i3-msg workspace next
click-right  = i3-msg workspace prev
click-middle = i3-msg workspace emergency

double-click-left   = i3-msg workspace number 1
double-click-right  = i3-msg workspace number 2
double-click-middle = i3-msg workspace number 3

cursor-click  = pointer
cursor-scroll = ns-resize

; === ÍCONES DE WORKSPACES ===
; Referência: http://fontawesome.io/cheatsheet/ | https://www.nerdfonts.com/cheat-sheet
ws-icon-0 = 1;
ws-icon-1 = 2;
ws-icon-2 = 3;
ws-icon-3 = 4;
ws-icon-4 = 5;
ws-icon-5 = 6;
ws-icon-6 = 7;
ws-icon-7 = 8; 
ws-icon-8 = 9; 
ws-icon-9 = 10;

; Ícone padrão para workspaces não listados
ws-icon-default = "  "

; === FORMATAÇÃO VISUAL ===
;label-separator = |

format            = <label-state> <label-mode>
format-foreground = ${colors.foreground}
format-background = ${colors.background}

; Modo ativo (ex: resize, tabbed)
label-mode            = %mode%
label-mode-padding    = 2
label-mode-foreground = #000000
label-mode-background = #FFBB00

; Workspace ativo no monitor atual
label-focused            = %icon% %name%
label-focused-background = ${colors.background}
label-focused-foreground = ${colors.foreground}
label-focused-underline  = ${colors.underline}
label-focused-padding    = 2

; Workspace inativo
label-unfocused            = %icon% %name%
label-unfocused-background = ${colors.background}
label-unfocused-foreground = ${colors.foreground}
label-unfocused-padding    = 2

; Workspace ativo em outro monitor
label-visible            = %icon% %name%
label-visible-background = ${self.label-focused-background}
label-visible-underline  = ${self.label-focused-underline}
label-visible-padding    = 2

; Workspace com alerta/urgência
label-urgent            = %icon% %name%
label-urgent-background = ${self.label-focused-background}
label-urgent-foreground = #db104e
label-urgent-padding    = 2

;----------------------------------------------------------
;  MÓDULO: Tray (bandeja do sistema)
;----------------------------------------------------------
[module/tray]
type = internal/tray

tray-detached  = false
tray-transient = false

tray-position = right
tray-align    = middle
tray-origin   = bar
tray-offset-x = 0
tray-offset-y = 0

;tray-size      = 18
tray-maxsize   = 16
;tray-max-width = 20%
tray-icon-size = 18
tray-scale     = 1.0

tray-background  = ${colors.background}
tray-foreground  = ${colors.foreground}
tray-transparent = true

tray-underline-size  = 2
tray-underline-color = ${colors.primary}

tray-padding = 1
tray-spacing = 1
tray-margin  = 1

;tray-application-whitelist = "discord,spotify,steam,org.wezfurlong.wezterm"
;tray-click-middle = none
;tray-click-right  = none

;----------------------------------------------------------
;  MÓDULO: Notificações (desativado)
;----------------------------------------------------------
;[module/notifications]
;type       = custom/script
;exec       = echo ""
;click-left = notification_menu.sh
;interval   = 0

;----------------------------------------------------------
;  MÓDULO: Usuário / Atalho ao home
;----------------------------------------------------------
[module/user]
type = custom/text

format           = <label>
format-padding   = 1
format-margin    = 1
;format-background = ${colors.background-alt}
format-underline = ${colors.underline}

label = "%{T4}%{T-}%{T0} Sidiclei%{T-}"

click-left  = bash -c 'if xdotool search --name "sidiclei - Thunar" windowminimize; then wmctrl -c "sidiclei - Thunar"; else thunar ~ & fi'
click-right = xdg-open https://wiki.archlinux.org
;click-middle = xdg-open ~

label-font = 4
;label-overline = ${colors.primary}
label-padding = 1

;----------------------------------------------------------
;  MÓDULO: Título da Janela Ativa
;----------------------------------------------------------
[module/xwindow]
type = internal/xwindow

format =     <label>
format-foreground = ${colors.primary}
format-background = ${colors.background}
format-underline  = ${colors.underline}
label-underline   = ${colors.underline}

label            = %title%
label-foreground = ${colors.foreground}
label-maxlen     = 30

label-empty            = Desktop
label-empty-foreground = ${colors.foreground}
label-empty-underline  = ${colors.foreground}

;----------------------------------------------------------
;  MÓDULO: Teclado / Layout (desativado)
;----------------------------------------------------------
;[module/xkeyboard]
;type = internal/xkeyboard
;blacklist-0 = num lock
;
;format-prefix            "  "
;format-prefix-foreground = ${colors.primary}
;format-prefix-underline  = ${colors.underline}
;format-foreground        = ${colors.foreground}
;
;label-layout               = %layout%
;label-layout-underline     = ${colors.underline}
;label-indicator-padding    = 2
;label-indicator-margin     = 1
;label-indicator-background = ${colors.secondary}
;label-indicator-underline  = ${colors.underline}

;----------------------------------------------------------
;  MÓDULO: Filesystem via script externo (desativado)
;----------------------------------------------------------
;[module/filesystem]
;type     = custom/script
;exec     = fs_status.sh
;interval = 30
;
;format           = <label>
;format-underline = ${colors.underline}

;----------------------------------------------------------
;  MÓDULO: Filesystem / Partição home (/home)
;----------------------------------------------------------
[module/fs_home]
type     = internal/fs
interval = 30

mount-0 = /home
;fixed-values = true
;spacing = 2

format-mounted-prefix            = "   "
format-mounted-prefix-foreground = ${colors.primary}
label-mounted-underline          = ${colors.underline}
format-mounted-prefix-underline  = ${colors.underline}
format = <label>

format-mounted = <label-mounted>

label-mounted   = %percentage_used%%
label-unmounted = %mountpoint% Não montado
;label-unmounted-foreground = ${colors.foreground-alt}

;----------------------------------------------------------
;  MÓDULO: Filesystem / Partição raiz (/)
;----------------------------------------------------------
[module/fs_root]
type     = internal/fs
interval = 30

mount-0 = /
;fixed-values = true
;spacing = 2

format-mounted-prefix            = "濫   "
format-mounted-prefix-foreground = ${colors.primary}
label-mounted-underline          = ${colors.underline}
format-mounted-prefix-underline  = ${colors.underline}

format = <label>

format-mounted = <label-mounted>

label-mounted   =  %percentage_used%%
label-unmounted = %mountpoint% Não montado
;label-unmounted-foreground = ${colors.foreground-alt}

;----------------------------------------------------------
;  MÓDULO: MPD - Music Player Daemon (desativado)
;----------------------------------------------------------
;[module/mpd]
;type = internal/mpd
;
;format-online  = <label-song>  <bar-progress> <controls>
;format-offline = <label-offline>
;
;controls   = <icon-prev> <icon-stop> <toggle> <icon-next>
#icon-prev  = 
#icon-next  = 
#icon-stop  = 
#icon-play  = 
#icon-pause = 
;
;bar-progress-width                = 35
;bar-progress-format               = %{+u +o}%fill%%{-u -o}%indicator%%{+u +o}%empty%%{-u -o}
;bar-progress-fill                 = █
;bar-progress-empty                = ▒
;bar-progress-indicator            = █
;bar-progress-fill-foreground      = #bb
;bar-progress-empty-foreground     = #44
;bar-progress-indicator-foreground = #A85659
;
;label-song = %{F#A85659}%{F-} %artist% - %title% [%elapsed%/%total%]
;label-offline = %{F#A85659} MPD offline%{F-}
;
;interval     = 1
;click-left   = mpc toggle
;click-right  = mpc next
;click-middle = mpc prev

;----------------------------------------------------------
;  MÓDULO: Brilho Monitor Dell via DDC/CI (desativado)
;----------------------------------------------------------
;[module/dell-brightness]
;type     = custom/script
;exec     = brightness.sh
;exec-if  = "which ddcutil && ddcutil detect | grep -q 'Display'"
;interval = 5
;
;scroll-up   = "bash -c 'ddcutil setvcp 10 + 3 && brightness.sh > /tmp/polybar_brightness_cache && polybar-msg hook dell-brightness 1'"
;scroll-down = "bash -c 'ddcutil setvcp 10 - 3 && brightness.sh > /tmp/polybar_brightness_cache && polybar-msg hook dell-brightness 1'"
;
;format              = <label>
;label               = %output%
;format-prefix       = " "
;format-prefix-foreground = ${colors.primary}
;format-underline    = ${colors.underline}

;----------------------------------------------------------
;  MÓDULO: Impressora
;----------------------------------------------------------
[module/print_config]
type  = custom/text
label = " "
format-prefix            = "  󱞆  "
format-underline         = ${colors.underline}
format-prefix-foreground = ${colors.primary}
click-right = open_printer_queue.sh
click-left  = toggle_printer_config.sh

;----------------------------------------------------------
;  MÓDULO: Spotify
;----------------------------------------------------------
[module/spotify]
type     = custom/script
interval = 1
format-prefix = " "
format        = <label>
exec = python $HOME/.config/polybar/scripts/spotify_status.py -f '{artist}: {song}'
format-underline = #1db954

click-left   = playerctl --player=spotify play-pause
click-right  = playerctl --player=spotify next
click-middle = playerctl --player=spotify previous

;----------------------------------------------------------
;  MÓDULO: Atualizações do Sistema
;----------------------------------------------------------
[module/sys_updates]
type     = custom/script
exec     = update_sys.sh --quiet
interval = 60
hook-0   = update_sys.sh --quiet

format            = <label>
format-font       = 4
format-background = ${colors.background}
format-prefix-foreground = ${colors.primary}
format-underline  = ${colors.underline}

click-left   = update_toggle.sh update_official.sh
click-right  = update_toggle.sh update_aur.sh
click-middle = update_toggle.sh update_check.sh

;----------------------------------------------------------
;  MÓDULO: USB / Pendrive
;----------------------------------------------------------
[module/pen_usb]
type     = custom/script
exec     = system_usb_udev.sh
tail     = true
interval = 3

format-prefix            = "  "
format-underline         = ${colors.underline}
format-prefix-foreground = #FF0000

label-mounted   = %output%
label-unmounted = %output%

click-left  = system_usb_udev.sh --mount-notify &
click-right = system_usb_udev.sh --unmount-notify &

;----------------------------------------------------------
;  MÓDULO: Volume PulseAudio
;----------------------------------------------------------
[module/pulseaudio]
type       = internal/pulseaudio
use-ui-max = true

format-volume           = <label-volume>
format-volume-underline = ${colors.underline}
format-volume-prefix    = "   "
format-volume-prefix-foreground = ${colors.primary}
label-volume = %percentage%%

label-muted            = "    "
label-muted-foreground = ${colors.alert}
format-muted-underline = ${colors.alert}

;click-middle =
click-right = pidof pavucontrol && killall pavucontrol || pavucontrol

;----------------------------------------------------------
;  MÓDULO: Bateria (script externo — ativo)
;----------------------------------------------------------
[module/battery]
type       = custom/script
exec       = battery_display.sh
interval   = 1
click-left = battery_status.sh

;----------------------------------------------------------
;  MÓDULO: Bateria nativa (desativada — mantida como referência)
;----------------------------------------------------------
;[module/battery-native]
;type    = internal/battery
;full-at = 98
;
;; ls -1 /sys/class/power_supply/
;battery = BAT0
;adapter = AC
;
;format-charging    = ⚡ <animation-charging>  <label-charging>
;format-discharging = <ramp-capacity> <label-discharging>
;format-full        = <ramp-capacity> <label-full>
;
;label-charging    = %percentage%%
;label-discharging = %percentage%%
;label-charging-padding    = 0
;label-discharging-padding = 0
;
;ramp-capacity-0            =
;ramp-capacity-0-foreground = ${colors.critical}
;ramp-capacity-1            =
;ramp-capacity-1-foreground = ${colors.low}
;ramp-capacity-2            =
;ramp-capacity-2-foreground = ${colors.warn}
;ramp-capacity-3            =
;ramp-capacity-3-foreground = ${colors.good}
;ramp-capacity-4            =
;ramp-capacity-4-foreground = ${colors.full}
;
;bar-capacity-width  = 10
;bar-capacity-format = %{+u}%{+o}%fill%%empty%%{-u}%{-o}
;bar-capacity-fill               = █
;bar-capacity-fill-foreground    = #ddffffff
;bar-capacity-fill-font          = 3
;bar-capacity-empty              = █
;bar-capacity-empty-font         = 3
;bar-capacity-empty-foreground   = #44ffffff
;
;animation-charging-0            =
;animation-charging-0-foreground = ${colors.primary}
;animation-charging-1            =
;animation-charging-1-foreground = ${colors.primary}
;animation-charging-2            =
;animation-charging-2-foreground = ${colors.primary}
;animation-charging-3            =
;animation-charging-3-foreground = ${colors.primary}
;animation-charging-4            =
;animation-charging-4-foreground = ${colors.primary}
;animation-charging-framerate    = 750

;----------------------------------------------------------
;  MÓDULO: RAM
;----------------------------------------------------------
[module/ram]
type     = internal/memory
interval = 2

format-prefix            = "   "
format-prefix-foreground = ${colors.primary}
format-underline         = ${colors.underline}

label = %percentage_used%%
;label = %gb_used% / %gb_total% GB (%percentage_used%%)

; Tokens disponíveis:
;   %percentage_used% (default)  %percentage_free%
;   %gb_used%  %gb_free%  %gb_total%
;   %mb_used%  %mb_free%  %mb_total%

;----------------------------------------------------------
;  MÓDULO: Temperatura CPU (lm_sensors)
;  Dependência: sensors-detect --auto
;----------------------------------------------------------
[module/temp_cpu]
type     = custom/script
exec     = tempcores.sh
interval = 2

format-padding           = 1
format-foreground        = ${colors.foreground}
format-background        = ${colors.background}
;format-prefix           = " "
format-prefix-foreground = ${colors.primary}
format-underline         = ${colors.underline}

label = %output:0:150:%

click-left  = toggle_sensors.sh
;click-right =

;----------------------------------------------------------
;  MÓDULO: CPU (Uso real em %)
;----------------------------------------------------------
[module/cpu]
type = custom/script
#exec = cpu_fast.sh
exec = vmstat 1 2 | tail -1 | awk '{print 100 - $15}'
interval = 2

format-prefix            = "   "
format-prefix-foreground = ${colors.primary}
format-underline         = ${colors.underline}

label = %output%%

click-left = btop.sh

;----------------------------------------------------------
;  MÓDULO: Data (script, com calendário ao clicar)
;----------------------------------------------------------
[module/date]
; Dependências: yad, xdotool
type     = custom/script
interval = 1
exec     = date +'%d/%m/%Y'
;exec    = date "+%a, %d %b"

format-prefix            = "   "
format-prefix-foreground = ${colors.primary}
format-underline         = ${colors.underline}

click-left = calendar.sh &
;click-left = popup_calendar.sh --popup &
;click-left = gsimplecal
;click-right = mailspring

;----------------------------------------------------------
;  MÓDULO: Hora (nativo)
;----------------------------------------------------------
[module/time]
type     = internal/date
interval = 1

;date    = " %d-%m-%Y"
time     = %H:%M
time-alt = %T

format-prefix            = " 󰦖 "
format-prefix-foreground = ${colors.primary}
format-underline         = ${colors.underline}

label = %date% %time%

;----------------------------------------------------------
;  MÓDULO: Lixeira
;----------------------------------------------------------
[module/lixeira]
type     = custom/script
interval = 2
exec     = lixeira.sh

format-prefix            = "   "
format-underline         = ${colors.underline}
format-prefix-foreground = ${colors.primary}

click-left  = bash -c 'if xdotool search --name "Lixeira" windowminimize; then wmctrl -c "Lixeira"; else thunar trash:/// & fi'
click-right = bash -c 'if zenity --question --title="" --text="Esvaziar lixeira?" --no-wrap --icon-name=user-trash; then rm -rf ~/.local/share/Trash/{files,info}/* && notify-send -i user-trash "Lixeira esvaziada!"; fi'

;----------------------------------------------------------
;  MÓDULO: Menu de Energia
;----------------------------------------------------------
[module/powermenu]
type           = custom/menu
expand-right   = true
format-spacing = 1

label-open  = "  "
label-open-foreground = ${colors.primary}
label-close = "  "
label-close-foreground = #ff3b30
label-separator            = " | "
label-separator-foreground = ${colors.foreground}

menu-0-0      = "  "
menu-0-0-exec = systemctl reboot --firmware-setup

menu-0-1      = "  "
; Nota: requer sudo sem senha para efibootmgr e reboot
; echo 'sidiclei ALL=(ALL) NOPASSWD: /usr/bin/efibootmgr, /usr/bin/reboot' | sudo tee /etc/sudoers.d/sidiclei
; sudo grep -oP "menuentry '\KWindows Boot Manager.*?(?=')" /boot/grub/grub.cfg | head -1
; menu-0-1-exec = sudo grub-reboot 'Windows Boot Manager (on /dev/nvme0n1p1)' && systemctl reboot
menu-0-1-exec = sudo efibootmgr -n 0004 && sudo reboot

menu-0-2      = "  "
menu-0-2-exec = i3-msg exit

menu-0-3      = " ⏾ "
menu-0-3-exec = systemctl suspend

menu-0-4      = "  "
menu-0-4-exec = systemctl reboot

menu-0-5      = "  "
menu-0-5-exec = systemctl poweroff


