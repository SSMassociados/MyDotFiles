;==========================================================
;                   CONFIGURAÇÃO DE FONTES
;                   ~/.config/polybar/fonts.ini
;==========================================================
; INSTRUÇÕES DE USO:
;
; 1. FONTE PRINCIPAL (font-0):
;    Descomente APENAS UMA. As demais devem permanecer comentadas.
;
; 2. FONTES DE ÍCONES (font-1 em diante):
;    Mantenha todas ativas para suporte completo a ícones.
;
; 3. COMANDOS ÚTEIS:
;    fc-list | grep -i "NomeDaFonte"              → Busca fonte instalada
;    fc-match "Fonte:style=Estilo"                → Testa correspondência
;    fc-match -s | grep -i "NomeDaFonte"          → Verifica similaridade
;    fc-cache -fv                                 → Atualiza cache de fontes
;    polybar -l trace main 2>&1 | grep -i font    → Lista fontes detectadas
;    yay -Syu font-manager                        → Gerenciador visual de fontes
;
; 4. RECURSOS:
;    Font Awesome : https://fontawesome.com/v7/cheatsheet
;    Nerd Fonts   : https://www.nerdfonts.com/cheat-sheet
;    Material     : https://pictogrammers.github.io/@mdi/font/6.4.95/
;
; 5. NOTA SOBRE DPI:
;    Configurado no [settings] do config.ini (dpi = 0 = automático)
;==========================================================

;==================== FONTE PRINCIPAL (escolha uma) ====================
; SF Pro Display - Fonte moderna estilo Apple (ATIVA)
font-0 = SF Pro Display:style=Bold:pixelsize=9;0

; Poppins - Fonte limpa com design arredondado
;font-0 = Poppins:style=Regular:pixelsize=9;1

; Roboto - Fonte clássica do Material Design
;font-0 = Roboto Bold:style=Bold:pixelsize=9;1

; Cantarell - Fonte padrão do GNOME
;font-0 = Cantarell:style=Bold:pixelsize=10;1

; JetBrains Mono - Ótima para programação
;font-0 = JetBrains Mono:style=Regular:pixelsize=11;1

; Source Sans Pro - Versátil e altamente legível
;font-0 = Source Sans Pro:style=Semi-Bold:pixelsize=11;1

; Fira Code
;font-0 = FiraCode Nerd Font:size=13;2

;==================== FONTES DE ÍCONES (mantenha todas ativas) ====================

; Font Awesome 7 - Ícones gerais (escolha uma versão, não misture FA5/FA6/FA7)
; Regular → ícones com contorno | Solid → ícones preenchidos | Brands → logos de marcas
font-1  = Font Awesome 7 Free:style=Regular:pixelsize=13;1
font-2  = Font Awesome 7 Free:style=Solid:pixelsize=13;1
font-3  = Font Awesome 7 Brands:style=Regular:pixelsize=13;1

; Nerd Fonts - Glifos extras, ícones de dev e símbolos para powerline/separadores
; Hack NF já embute os símbolos Nerd | Symbols Mono como fallback de símbolos
font-4  = Hack Nerd Font:style=Regular:pixelsize=13;1
font-5  = Symbols Nerd Font Mono:pixelsize=13;1

; Material Design Icons (MDI) - Ícones estilo Google/Material, mais completo que "Material Icons"
font-6  = Material Design Icons:style=Regular:pixelsize=13;1
font-7  = Material Symbols Outlined:style=Regular:size=12;3    
font-8  = Material Symbols Outlined:style=Sharp:size=12;3
; Feather - Ícones minimalistas de linha fina, estilo clean
font-9  = Feather:pixelsize=13;1

; Codicons - Ícones do VS Code, útil para módulos de desenvolvimento
font-10  = Codicons:pixelsize=13;1

; Weather Icons - Ícones meteorológicos (sol, chuva, vento etc.)
font-11  = Weather Icons:style=Regular:pixelsize=13;1

; FontLogos - Logotipos de distribuições Linux e projetos open source
font-12 = FontLogos:style=Regular:pixelsize=13;1

; Octicons - Ícones do GitHub (útil para módulos de git/repositório)
font-13 = Octicons:pixelsize=13;1

; Fira Code - Fonte monospace com ligaduras, útil para exibir código ou separadores especiais
font-14 = Fira Code:pixelsize=13;1
